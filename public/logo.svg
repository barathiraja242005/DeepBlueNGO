<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#0F2854"/>
  
  <!-- Medical Cross with gradient -->
  <defs>
    <linearGradient id="crossGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#BDE8F5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4988C4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1C4D8D;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Cross vertical -->
  <rect x="85" y="50" width="30" height="100" rx="8" fill="url(#crossGradient)"/>
  
  <!-- Cross horizontal -->
  <rect x="50" y="85" width="100" height="30" rx="8" fill="url(#crossGradient)"/>
  
  <!-- Location pins -->
  <g opacity="0.9">
    <path d="M70 70 L70 55 C70 50 75 45 80 45 C85 45 90 50 90 55 L90 70" stroke="#BDE8F5" stroke-width="3" fill="none"/>
    <circle cx="80" cy="55" r="5" fill="#BDE8F5"/>
  </g>
  
  <g opacity="0.9">
    <path d="M110 130 L110 145 C110 150 115 155 120 155 C125 155 130 150 130 145 L130 130" stroke="#BDE8F5" stroke-width="3" fill="none"/>
    <circle cx="120" cy="145" r="5" fill="#BDE8F5"/>
  </g>
  
  <!-- Data points / analytics dots -->
  <circle cx="60" cy="60" r="4" fill="#4988C4"/>
  <circle cx="140" cy="60" r="4" fill="#4988C4"/>
  <circle cx="60" cy="140" r="4" fill="#4988C4"/>
  <circle cx="140" cy="140" r="4" fill="#4988C4"/>
  
  <!-- Connecting lines (network effect) -->
  <line x1="60" y1="60" x2="80" y2="70" stroke="#1C4D8D" stroke-width="2" opacity="0.5"/>
  <line x1="140" y1="60" x2="120" y2="70" stroke="#1C4D8D" stroke-width="2" opacity="0.5"/>
  <line x1="60" y1="140" x2="80" y2="130" stroke="#1C4D8D" stroke-width="2" opacity="0.5"/>
  <line x1="140" y1="140" x2="120" y2="130" stroke="#1C4D8D" stroke-width="2" opacity="0.5"/>
</svg>
